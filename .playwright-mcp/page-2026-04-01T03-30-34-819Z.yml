              - heading "Memory in the 8086" [level=2] [ref=e585]
              - heading "Physical Memory Organization" [level=3] [ref=e586]
              - paragraph [ref=e587]: The 8086 has a 20-bit address bus, allowing it to address 1 MB of memory (addresses 00000h to FFFFFh).
              - heading "Segmented Memory Model" [level=3] [ref=e588]
