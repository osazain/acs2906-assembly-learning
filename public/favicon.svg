<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#863bff"/>
  
  <!-- CPU chip outline -->
  <rect x="6" y="6" width="20" height="20" rx="2" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  
  <!-- CPU pins (left) -->
  <rect x="2" y="10" width="4" height="2" rx="0.5" fill="#c4b5fd"/>
  <rect x="2" y="15" width="4" height="2" rx="0.5" fill="#c4b5fd"/>
  <rect x="2" y="20" width="4" height="2" rx="0.5" fill="#c4b5fd"/>
  
  <!-- CPU pins (right) -->
  <rect x="26" y="10" width="4" height="2" rx="0.5" fill="#c4b5fd"/>
  <rect x="26" y="15" width="4" height="2" rx="0.5" fill="#c4b5fd"/>
  <rect x="26" y="20" width="4" height="2" rx="0.5" fill="#c4b5fd"/>
  
  <!-- CPU pins (top) -->
  <rect x="10" y="2" width="2" height="4" rx="0.5" fill="#c4b5fd"/>
  <rect x="15" y="2" width="2" height="4" rx="0.5" fill="#c4b5fd"/>
  <rect x="20" y="2" width="2" height="4" rx="0.5" fill="#c4b5fd"/>
  
  <!-- CPU pins (bottom) -->
  <rect x="10" y="26" width="2" height="4" rx="0.5" fill="#c4b5fd"/>
  <rect x="15" y="26" width="2" height="4" rx="0.5" fill="#c4b5fd"/>
  <rect x="20" y="26" width="2" height="4" rx="0.5" fill="#c4b5fd"/>
  
  <!-- "A" letter for Assembly -->
  <text x="16" y="21" font-family="monospace" font-size="11" font-weight="bold" fill="#22d3ee" text-anchor="middle">A</text>
  
  <!-- Binary/hex accent lines -->
  <line x1="9" y1="9" x2="12" y2="9" stroke="#863bff" stroke-width="1" stroke-linecap="round"/>
  <line x1="9" y1="11" x2="11" y2="11" stroke="#863bff" stroke-width="1" stroke-linecap="round"/>
</svg>
