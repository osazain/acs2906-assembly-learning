commands:
  install: npm ci --legacy-peer-deps
  validate: npm run validate:content
  lint: npm run lint
  build: npm run build
  # NOTE: npm run test is NOT defined - use validate + build for validation
  extract-pdfs: python extract-pdfs.py

services: {}

notes:
  python: "Python 3.14 with pdfplumber installed (pip install pdfplumber)"
  raw-text-dir: "data/raw/lecture*_full.txt — extracted from PDFs using extract-pdfs.py"
  lectures-json: "data/processed/lectures.json — target for content extraction"
