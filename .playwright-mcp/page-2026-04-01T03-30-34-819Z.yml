                - text: Because 8086 registers are only 16 bits, the processor uses
                - strong [ref=e590]: segmentation
                - text: "to achieve 20-bit addressing:"
              - code [ref=e592]: Physical Address = (Segment × 16) + Offset
              - paragraph [ref=e593]: "This is often written as:"
              - code [ref=e595]: Segment:Offset → Physical Address
              - heading "Segment Types" [level=3] [ref=e596]
              - paragraph [ref=e597]: "| Segment | Register | Purpose | |---------|----------|---------| | Code | CS | Stores executable instructions | | Data | DS | Stores program variables | | Stack | SS | Stores stack data (PUSH/POP) | | Extra | ES | Additional data segment |"
              - heading "Calculating Physical Addresses" [level=3] [ref=e598]
